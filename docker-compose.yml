# =============================================================================
# Teloscopy - Docker Compose Configuration
# =============================================================================
# Usage:
#   docker compose up            # start in foreground
#   docker compose up -d         # start in background
#   docker compose down          # stop all services
#   docker compose logs -f       # follow logs
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Main application server
  # ---------------------------------------------------------------------------
  teloscopy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teloscopy-app
    ports:
      - "${TELOSCOPY_PORT:-8000}:8000"
    volumes:
      # Persist user uploads and analysis output across container restarts
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - TELOSCOPY_ENV=${TELOSCOPY_ENV:-production}
      - TELOSCOPY_HOST=0.0.0.0
      - TELOSCOPY_PORT=8000
      - TELOSCOPY_UPLOAD_DIR=/app/data/uploads
      - TELOSCOPY_OUTPUT_DIR=/app/output
      - TELOSCOPY_MAX_UPLOAD_SIZE=${TELOSCOPY_MAX_UPLOAD_SIZE:-50MB}
      - TELOSCOPY_LOG_LEVEL=${TELOSCOPY_LOG_LEVEL:-INFO}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# ---------------------------------------------------------------------------
# Named volumes (optional – uncomment to use Docker-managed volumes instead
# of bind mounts above)
# ---------------------------------------------------------------------------
# volumes:
#   teloscopy-data:
#   teloscopy-output:
#   teloscopy-logs:
